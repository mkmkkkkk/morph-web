name: Test
on:
  push:
    paths: ['morph/**']
  pull_request:
    paths: ['morph/**']

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: morph/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: morph/app/package-lock.json
      - run: npm ci
      - run: npx jest --passWithNoTests
