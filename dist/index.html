  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Theme: Dark (default) ── */
    :root, [data-theme="dark"] {

      --success: #30d158; --success-bg: rgba(48,209,88,0.12); --success-border: rgba(48,209,88,0.4);

      --pixel-scanlines: none;

    /* ── Theme: Light ── */
    [data-theme="light"] {
      --bg-primary: #f2f2f7; --bg-secondary: #e5e5ea; --bg-card: #fff;
      --bg-elevated: rgba(255,255,255,0.95); --bg-overlay: rgba(0,0,0,0.3);
      --bg-input: rgba(0,0,0,0.05); --bg-hover: rgba(0,0,0,0.04);
      --text-primary: #000; --text-secondary: #666; --text-tertiary: #999; --text-label: #6e6e73;
      --border: rgba(0,0,0,0.06); --border-strong: rgba(0,0,0,0.10); --border-input: rgba(0,0,0,0.12);
      --accent: #636AFF; --accent-bg: rgba(99,106,255,0.12);
      --danger: #ff3b30; --danger-bg: rgba(255,59,48,0.10); --danger-border: rgba(255,59,48,0.3);

    /* ── Theme: Sunny ── */
    [data-theme="sunny"] {
      --bg-primary: #f4ede1; --bg-secondary: #eae2d3; --bg-card: #f7f1e7;
      --bg-elevated: rgba(245,240,232,0.95); --bg-overlay: rgba(42,36,32,0.3);

      --text-primary: #2a2420; --text-secondary: #6b5d4f; --text-tertiary: #998a7a; --text-label: #8a7d6e;
      --border: rgba(42,36,32,0.08); --border-strong: rgba(42,36,32,0.12); --border-input: rgba(42,36,32,0.15);
      --accent: #b87333; --accent-bg: rgba(184,115,51,0.12);
      --danger: #c44230; --danger-bg: rgba(196,66,48,0.10); --danger-border: rgba(196,66,48,0.3);
      --success: #5a8a4a; --success-bg: rgba(90,138,74,0.10); --success-border: rgba(90,138,74,0.3);
      --warning: #d4882a;
      --bar-track: rgba(42,36,32,0.08); --bar-fill: rgba(42,36,32,0.2);
      --scrollbar-thumb: rgba(42,36,32,0.15);
      --font-body: 'Georgia', 'Times New Roman', serif;
      --sunny-texture: url("data:image/svg+xml,%3Csvg width='300' height='300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E"), url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.4' numOctaves='2' seed='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)' opacity='0.04'/%3E%3C/svg%3E");
      --pixel-scanlines: none;
      color-scheme: light;
    }

    /* ── Theme: Pixel — 8-bit retro mosaic ── */
    [data-theme="pixel"] {
      --bg-primary: #0a0f0a; --bg-secondary: #111a11; --bg-card: #0e150e;
      --bg-elevated: rgba(14,21,14,0.96); --bg-overlay: rgba(0,0,0,0.7);
      --bg-input: rgba(0,255,136,0.08); --bg-hover: rgba(0,255,136,0.05);
      --text-primary: #d0f0d0; --text-secondary: #00ff88; --text-tertiary: #00aa55; --text-label: #00cc66;
      --border: rgba(0,255,136,0.15); --border-strong: rgba(0,255,136,0.25); --border-input: rgba(0,255,136,0.18);
      --accent: #ffcc00; --accent-bg: rgba(255,204,0,0.18);
      --danger: #ff3322; --danger-bg: rgba(255,51,34,0.18); --danger-border: rgba(255,51,34,0.5);
      --success: #00ff88; --success-bg: rgba(0,255,136,0.15); --success-border: rgba(0,255,136,0.5);
      --warning: #ff9900;
      --bar-track: rgba(0,255,136,0.10); --bar-fill: rgba(0,255,136,0.40);
      --scrollbar-thumb: rgba(0,255,136,0.20);
      --font-body: 'VT323', 'DotGothic16', 'Press Start 2P', 'Menlo', monospace;
      --sunny-texture: none;
      --pixel-scanlines: repeating-linear-gradient(transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      --pixel-border-radius: 0px;
      color-scheme: dark;
    }

    /* ── Theme: Glass — iOS 26 Liquid Glass ── */
    [data-theme="glass"] {
      --bg-primary: transparent; --bg-secondary: rgba(255,255,255,0.08); --bg-card: rgba(255,255,255,0.15);
      --bg-elevated: rgba(255,255,255,0.25); --bg-overlay: rgba(0,0,0,0.25);
      --bg-input: rgba(255,255,255,0.15); --bg-hover: rgba(255,255,255,0.10);
      --text-primary: rgba(0,0,0,0.85); --text-secondary: rgba(0,0,0,0.55); --text-tertiary: rgba(0,0,0,0.35); --text-label: rgba(0,0,0,0.50);
      --border: rgba(255,255,255,0.30); --border-strong: rgba(255,255,255,0.50); --border-input: rgba(255,255,255,0.35);
      --accent: #007AFF; --accent-bg: rgba(0,122,255,0.15);
      --danger: #ff3b30; --danger-bg: rgba(255,59,48,0.12); --danger-border: rgba(255,59,48,0.35);
      --success: #34c759; --success-bg: rgba(52,199,89,0.12); --success-border: rgba(52,199,89,0.35);
      --warning: #ff9500;
      --bar-track: rgba(255,255,255,0.12); --bar-fill: rgba(0,122,255,0.25);
      --scrollbar-thumb: rgba(0,0,0,0.08);
      --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: light;
    }

    /* ── Theme: Bloomberg — financial terminal ── */
    [data-theme="bloomberg"] {
      --bg-primary: #0c0c0c; --bg-secondary: #141414; --bg-card: #1a1a1a;
      --bg-elevated: rgba(26,26,26,0.97); --bg-overlay: rgba(0,0,0,0.75);
      --bg-input: rgba(255,160,0,0.06); --bg-hover: rgba(255,160,0,0.04);
      --text-primary: #ff9a00; --text-secondary: #cc7a00; --text-tertiary: #8a5500; --text-label: #b08000;
      --border: rgba(255,160,0,0.12); --border-strong: rgba(255,160,0,0.22); --border-input: rgba(255,160,0,0.15);
      --accent: #3b82f6; --accent-bg: rgba(59,130,246,0.15);
      --danger: #ef4444; --danger-bg: rgba(239,68,68,0.15); --danger-border: rgba(239,68,68,0.4);
      --success: #22c55e; --success-bg: rgba(34,197,94,0.12); --success-border: rgba(34,197,94,0.4);
      --warning: #ff9a00;
      --bar-track: rgba(255,160,0,0.08); --bar-fill: rgba(255,160,0,0.35);
      --scrollbar-thumb: rgba(255,160,0,0.15);
      --font-body: 'Menlo', 'SF Mono', 'Consolas', 'Courier New', monospace;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: dark;
    }

    /* Global input/textarea text + placeholder color — ensures visibility in all themes */
    input, textarea { color: var(--text-primary); }
    input::placeholder, textarea::placeholder { color: var(--text-tertiary); opacity: 1; }
    html, body { margin: 0; padding: 0; background: var(--bg-primary); overflow: hidden; height: var(--real-h, 100%); overscroll-behavior: none; }
    [data-theme="glass"] body { background: linear-gradient(145deg, #b8d8e8 0%, #d4e4d0 20%, #e8dcc8 40%, #c0d8e8 60%, #d8e0c8 80%, #b0d0e0 100%); background-size: 300% 300%; animation: liquidShift 20s ease infinite; }
    @keyframes liquidShift { 0% { background-position: 0% 50%; } 33% { background-position: 100% 0%; } 66% { background-position: 50% 100%; } 100% { background-position: 0% 50%; } }
    [data-theme="pixel"] body { background-color: #0a0f0a; background-image: linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px); background-size: 8px 8px; image-rendering: pixelated; }
    #root { height: var(--real-h, 100%); width: 100%; background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-body); overflow: hidden; overscroll-behavior: none; position: relative; }
    [data-theme="glass"] #root { background: rgba(255,255,255,0.05); backdrop-filter: blur(16px) saturate(1.8); -webkit-backdrop-filter: blur(16px) saturate(1.8); }
    [data-theme="pixel"] #root { background: transparent; }
    #root::after { content: ''; position: fixed; inset: 0; background-image: var(--sunny-texture); background-repeat: repeat; pointer-events: none; z-index: 0; }
    #root::before { content: ''; position: fixed; inset: 0; background-image: var(--pixel-scanlines); pointer-events: none; z-index: 9997; }
    #root > * { position: relative; z-index: 1; }
    /* Bloomberg: dense monospace, amber grid, sharp but not pixelated */
    [data-theme="bloomberg"] body { background-color: #0c0c0c; background-image: linear-gradient(rgba(255,160,0,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,160,0,0.02) 1px, transparent 1px); background-size: 16px 16px; }
    [data-theme="bloomberg"] * { border-radius: 2px !important; font-family: 'Menlo', 'SF Mono', 'Consolas', monospace !important; }
    [data-theme="bloomberg"] button { border: 1px solid rgba(255,160,0,0.18) !important; text-transform: uppercase; letter-spacing: 0.5px; font-size: 12px !important; font-weight: 600; }
    [data-theme="bloomberg"] input, [data-theme="bloomberg"] textarea { border: 1px solid rgba(255,160,0,0.18) !important; }
    /* Pixel: force sharp corners, pixelated rendering, chunky borders */
    [data-theme="pixel"] * { border-radius: 0px !important; font-family: var(--font-body) !important; }
    [data-theme="pixel"] button { border: 2px solid rgba(0,255,136,0.25) !important; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
    [data-theme="pixel"] input, [data-theme="pixel"] textarea { border: 2px solid rgba(0,255,136,0.25) !important; }
    /* Liquid Glass: 3-layer Apple spec — specular highlight + backdrop blur + depth shadow */
    [data-theme="glass"] div[style*="bg-card"], [data-theme="glass"] div[style*="Card"] {
      backdrop-filter: blur(16px) saturate(1.8); -webkit-backdrop-filter: blur(16px) saturate(1.8);
      border: 1px solid rgba(255,255,255,0.3) !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), inset 0 0 20px -5px rgba(255,255,255,0.3), 0 8px 32px rgba(31,38,135,0.15);
    }

    /* ── Sunny mode: tree shadow video overlay ── */
    [data-theme="sunny"] #sunny-shadow { display: block; }
    #sunny-shadow {
      display: none;
      position: fixed; inset: 0; pointer-events: none; z-index: 9998;
      overflow: hidden;
    }
    #sunny-shadow video {
      position: absolute;
      width: 100%; height: 100%;
      object-fit: cover;
      mix-blend-mode: multiply;
      opacity: 0.35;
      pointer-events: none;
    }
  </style>

<body>
  <div id="root"></div>
  <!-- Sunny mode: real tree shadow video loop + mix-blend-mode: multiply -->
  <div id="sunny-shadow">
    <video autoplay loop muted playsinline disablepictureinpicture>
      <source src="/tree-shadow.mp4" type="video/mp4">
    </video>
  </div>
  <script>
    // Apply saved theme immediately (no flash)
    var savedTheme = localStorage.getItem('morph-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    var themeColors = { dark: '#0a0a0a', light: '#f2f2f7', sunny: '#f4ede1', pixel: '#0a0f0a', glass: '#b8d8e8', bloomberg: '#0c0c0c' };
    document.getElementById('meta-theme-color').content = themeColors[savedTheme] || themeColors.dark;

    // Standalone PWA: use screen.height (covers full screen incl. safe areas)
    // Safari browser: use innerHeight (screen.height > visible area → black gap above)
    var isStandalone = window.navigator.standalone;
    var screenH = isStandalone ? window.screen.height : window.innerHeight;
    document.documentElement.style.setProperty('--real-h', screenH + 'px');
    document.getElementById('root').style.height = screenH + 'px';

    // Block iOS rubber-band — prevent overscroll at scroll boundaries
    var _touchStartY = 0;
    document.addEventListener('touchstart', function(e) {
      _touchStartY = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchmove', function(e) {
      var t = e.target;
      // Always allow touch in input/textarea (cursor, selection)
      if (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA') return;
      // Skip overlay elements (sunny-shadow video, paper texture) — they're pointer-events:none but iOS can still target them
      if (t.closest && t.closest('#sunny-shadow')) return;
      // Find scrollable ancestor
      var el = t;
      while (el && el !== document.body) {
        var style = window.getComputedStyle(el);
        if (style.overflowY === 'scroll' || style.overflowY === 'auto') {
          if (el.scrollHeight > el.clientHeight) {
            var dy = e.touches[0].clientY - _touchStartY;
            if ((dy > 0 && el.scrollTop <= 0) || (dy < 0 && el.scrollTop + el.clientHeight >= el.scrollHeight)) {
              e.preventDefault();
            }
            return;
          }
        }
        el = el.parentElement;
      }
      e.preventDefault();
    }, { passive: false });

    // Disable iOS back/forward swipe gesture (left/right edge)
    // Always block browser native gesture. Session terminal handles swipe-back via React touch events.
    document.addEventListener('touchstart', function(e) {
      var x = e.touches[0].clientX;
      if (x < 25 || x > window.innerWidth - 25) e.preventDefault();
    }, { passive: false });

    // Lock browser history — prevent back/forward navigation entirely
    // Push a dummy state so there's nothing to go "back" to
    history.pushState(null, '', location.href);
    window.addEventListener('popstate', function() {
      // Re-push state to trap the user on this page
      history.pushState(null, '', location.href);
    });

    // Keyboard handling — resize root to visual viewport when keyboard opens
    function resetFullHeight() {
      var root = document.getElementById('root');
      var h = isStandalone ? screenH : window.innerHeight;
      root.style.height = h + 'px';
      root.style.position = '';
      root.style.bottom = '';
      root.style.top = '';
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', function() {
        var vvh = window.visualViewport.height;
        var root = document.getElementById('root');
        // Keyboard open: visualViewport shrinks significantly
        if (vvh < screenH * 0.75) {
          root.style.height = vvh + 'px';
          // Pin to bottom of visual viewport
          root.style.position = 'fixed';
          root.style.bottom = '0';
          root.style.top = 'auto';
        } else {
          resetFullHeight();
        }
      });
    }
    // iOS app-switch fix: Safari may report wrong viewport on resume.
    // Force full-height reset when page becomes visible again.
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible') {
        setTimeout(resetFullHeight, 50);
        // iOS sometimes settles viewport after a second delay
        setTimeout(resetFullHeight, 300);
      }
    });
  </script>
