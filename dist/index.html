<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0a" id="meta-theme-color" />
  <title>Morph</title>
  <link rel="icon" href="/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-icon-v3.png" />
  <link rel="manifest" href="/manifest.json" />
  <style>@font-face { font-family: 'CloisterBlack'; src: url('/CloisterBlack.ttf'); }</style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Theme: Dark (default) ── */
    :root, [data-theme="dark"] {
      --bg-primary: #0a0a0a; --bg-secondary: #111; --bg-card: #1c1c1e;
      --bg-elevated: rgba(28,28,30,0.92); --bg-overlay: rgba(0,0,0,0.5);
      --bg-input: rgba(255,255,255,0.08); --bg-hover: rgba(255,255,255,0.06);
      --text-primary: #fff; --text-secondary: #999; --text-tertiary: #666; --text-label: #8e8e93;
      --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.10); --border-input: rgba(255,255,255,0.12);
      --accent: #636AFF; --accent-bg: rgba(99,106,255,0.15);
      --danger: #ff453a; --danger-bg: rgba(255,59,48,0.15); --danger-border: rgba(255,59,48,0.4);
      --success: #30d158; --success-bg: rgba(48,209,88,0.12); --success-border: rgba(48,209,88,0.4);
      --warning: #ff9f0a;
      --bar-track: rgba(255,255,255,0.08); --bar-fill: rgba(255,255,255,0.3);
      --scrollbar-thumb: rgba(255,255,255,0.15);
      --font-body: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: dark;
    }

    /* ── Theme: Light ── */
    [data-theme="light"] {
      --bg-primary: #f5f0eb; --bg-secondary: #eae4dc; --bg-card: #faf7f4;
      --bg-elevated: rgba(255,255,255,0.95); --bg-overlay: rgba(0,0,0,0.3);
      --bg-input: rgba(0,0,0,0.05); --bg-hover: rgba(0,0,0,0.04);
      --text-primary: #2a2420; --text-secondary: #6b5e54; --text-tertiary: #998b80; --text-label: #7a6e64;
      --border: rgba(42,36,32,0.07); --border-strong: rgba(42,36,32,0.11); --border-input: rgba(42,36,32,0.13);
      --accent: #B8907A; --accent-bg: rgba(184,144,122,0.14);
      --danger: #ff3b30; --danger-bg: rgba(255,59,48,0.10); --danger-border: rgba(255,59,48,0.3);
      --success: #34c759; --success-bg: rgba(52,199,89,0.10); --success-border: rgba(52,199,89,0.3);
      --warning: #ff9500;
      --bar-track: rgba(0,0,0,0.06); --bar-fill: rgba(0,0,0,0.2);
      --scrollbar-thumb: rgba(0,0,0,0.15);
      --font-body: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: light;
    }

    /* ── Theme: Sunny ── */
    [data-theme="sunny"] {
      --bg-primary: #f4ede1; --bg-secondary: #eae2d3; --bg-card: #f7f1e7;
      --bg-elevated: rgba(245,240,232,0.95); --bg-overlay: rgba(42,36,32,0.3);
      --bg-input: rgba(42,36,32,0.06); --bg-hover: rgba(42,36,32,0.04);
      --text-primary: #2a2420; --text-secondary: #6b5d4f; --text-tertiary: #998a7a; --text-label: #8a7d6e;
      --border: rgba(42,36,32,0.08); --border-strong: rgba(42,36,32,0.12); --border-input: rgba(42,36,32,0.15);
      --accent: #b87333; --accent-bg: rgba(184,115,51,0.12);
      --danger: #c44230; --danger-bg: rgba(196,66,48,0.10); --danger-border: rgba(196,66,48,0.3);
      --success: #5a8a4a; --success-bg: rgba(90,138,74,0.10); --success-border: rgba(90,138,74,0.3);
      --warning: #d4882a;
      --bar-track: rgba(42,36,32,0.08); --bar-fill: rgba(42,36,32,0.2);
      --scrollbar-thumb: rgba(42,36,32,0.15);
      --font-body: 'Georgia', 'Times New Roman', serif;
      --sunny-texture: url("data:image/svg+xml,%3Csvg width='300' height='300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E"), url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.4' numOctaves='2' seed='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)' opacity='0.04'/%3E%3C/svg%3E");
      --pixel-scanlines: none;
      color-scheme: light;
    }

    /* ── Theme: Pixel — clean retro terminal ── */
    [data-theme="pixel"] {
      --bg-primary: #0a0f0a; --bg-secondary: #111a11; --bg-card: #0e150e;
      --bg-elevated: rgba(14,21,14,0.96); --bg-overlay: rgba(0,0,0,0.7);
      --bg-input: rgba(0,255,136,0.08); --bg-hover: rgba(0,255,136,0.05);
      --text-primary: #c0e0c0; --text-secondary: #60c080; --text-tertiary: #408060; --text-label: #50a070;
      --border: rgba(0,255,136,0.12); --border-strong: rgba(0,255,136,0.20); --border-input: rgba(0,255,136,0.15);
      --accent: #ff77ff; --accent-bg: rgba(255,119,255,0.15);
      --danger: #ff4444; --danger-bg: rgba(255,68,68,0.15); --danger-border: rgba(255,68,68,0.4);
      --success: #40d080; --success-bg: rgba(64,208,128,0.12); --success-border: rgba(64,208,128,0.4);
      --warning: #d0a040;
      --bar-track: rgba(0,255,136,0.08); --bar-fill: rgba(0,255,136,0.30);
      --scrollbar-thumb: rgba(0,255,136,0.15);
      --font-body: 'Menlo', 'SF Mono', 'Consolas', monospace;
      --sunny-texture: none;
      --pixel-scanlines: repeating-linear-gradient(transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
      --pixel-border-radius: 0px;
      color-scheme: dark;
    }

    /* ── Theme: Glass — iOS 26 Liquid Glass ── */
    [data-theme="glass"] {
      --bg-primary: transparent; --bg-secondary: rgba(255,255,255,0.08); --bg-card: rgba(255,255,255,0.15);
      --bg-elevated: rgba(255,255,255,0.25); --bg-overlay: rgba(0,0,0,0.25);
      --bg-input: rgba(255,255,255,0.15); --bg-hover: rgba(255,255,255,0.10);
      --text-primary: rgba(0,0,0,0.85); --text-secondary: rgba(0,0,0,0.55); --text-tertiary: rgba(0,0,0,0.35); --text-label: rgba(0,0,0,0.50);
      --border: rgba(255,255,255,0.30); --border-strong: rgba(255,255,255,0.50); --border-input: rgba(255,255,255,0.35);
      --accent: #8C9A88; --accent-bg: rgba(140,154,136,0.18);
      --danger: #ff3b30; --danger-bg: rgba(255,59,48,0.12); --danger-border: rgba(255,59,48,0.35);
      --success: #34c759; --success-bg: rgba(52,199,89,0.12); --success-border: rgba(52,199,89,0.35);
      --warning: #ff9500;
      --bar-track: rgba(255,255,255,0.12); --bar-fill: rgba(140,154,136,0.25);
      --scrollbar-thumb: rgba(0,0,0,0.08);
      --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: light;
    }

    /* ── Theme: Bloomberg — financial terminal ── */
    [data-theme="bloomberg"] {
      --bg-primary: #0c0c0c; --bg-secondary: #141414; --bg-card: #1a1a1a;
      --bg-elevated: rgba(26,26,26,0.97); --bg-overlay: rgba(0,0,0,0.75);
      --bg-input: rgba(255,160,0,0.06); --bg-hover: rgba(255,160,0,0.04);
      --text-primary: #ff9a00; --text-secondary: #cc7a00; --text-tertiary: #8a5500; --text-label: #b08000;
      --border: rgba(255,160,0,0.12); --border-strong: rgba(255,160,0,0.22); --border-input: rgba(255,160,0,0.15);
      --accent: #D4AA40; --accent-bg: rgba(212,170,64,0.15);
      --danger: #ef4444; --danger-bg: rgba(239,68,68,0.15); --danger-border: rgba(239,68,68,0.4);
      --success: #22c55e; --success-bg: rgba(34,197,94,0.12); --success-border: rgba(34,197,94,0.4);
      --warning: #ff9a00;
      --bar-track: rgba(255,160,0,0.08); --bar-fill: rgba(255,160,0,0.35);
      --scrollbar-thumb: rgba(255,160,0,0.15);
      --font-body: 'Menlo', 'SF Mono', 'Consolas', 'Courier New', monospace;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: dark;
    }

    /* ── Theme: Ink — 水墨 dark ink wash ── */
    [data-theme="ink"] {
      --bg-primary: #0c0b0a; --bg-secondary: #141312; --bg-card: #1a1918;
      --bg-elevated: rgba(26,25,24,0.96); --bg-overlay: rgba(0,0,0,0.6);
      --bg-input: rgba(255,255,255,0.04); --bg-hover: rgba(255,255,255,0.03);
      --text-primary: #d8d4cc; --text-secondary: #8a8680; --text-tertiary: #5a5854; --text-label: #706c66;
      --border: rgba(255,255,255,0.06); --border-strong: rgba(255,255,255,0.10); --border-input: rgba(255,255,255,0.08);
      --accent: #c4b8a0; --accent-bg: rgba(196,184,160,0.10);
      --danger: #a04040; --danger-bg: rgba(160,64,64,0.10); --danger-border: rgba(160,64,64,0.30);
      --success: #5a8a5a; --success-bg: rgba(90,138,90,0.08); --success-border: rgba(90,138,90,0.25);
      --warning: #a08a50;
      --bar-track: rgba(255,255,255,0.05); --bar-fill: rgba(255,255,255,0.15);
      --scrollbar-thumb: rgba(255,255,255,0.08);
      --font-body: 'Georgia', 'Noto Serif SC', 'Times New Roman', serif;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: dark;
    }

    /* ── Theme: Cosmos — 深空 starfield ── */
    [data-theme="cosmos"] {
      --bg-primary: #08080f; --bg-secondary: #0e0e18; --bg-card: #12121e;
      --bg-elevated: rgba(18,18,30,0.96); --bg-overlay: rgba(0,0,0,0.6);
      --bg-input: rgba(160,140,200,0.06); --bg-hover: rgba(160,140,200,0.04);
      --text-primary: #d8d4e0; --text-secondary: #8a84a0; --text-tertiary: #5e5878; --text-label: #7a7490;
      --border: rgba(160,140,200,0.10); --border-strong: rgba(160,140,200,0.18); --border-input: rgba(160,140,200,0.12);
      --accent: #a08cc0; --accent-bg: rgba(160,140,192,0.12);
      --danger: #c45050; --danger-bg: rgba(196,80,80,0.12); --danger-border: rgba(196,80,80,0.35);
      --success: #50a870; --success-bg: rgba(80,168,112,0.10); --success-border: rgba(80,168,112,0.35);
      --warning: #c4a050;
      --bar-track: rgba(160,140,200,0.08); --bar-fill: rgba(160,140,200,0.28);
      --scrollbar-thumb: rgba(160,140,200,0.12);
      --font-body: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: dark;
    }

    /* ── Theme: Aurora — 极光 northern lights ── */
    [data-theme="aurora"] {
      --bg-primary: #080810; --bg-secondary: #0e0e1a; --bg-card: rgba(16,16,28,0.85);
      --bg-elevated: rgba(20,20,35,0.92); --bg-overlay: rgba(0,0,0,0.5);
      --bg-input: rgba(120,200,160,0.06); --bg-hover: rgba(120,200,160,0.04);
      --text-primary: #d0dcd4; --text-secondary: #7a9a88; --text-tertiary: #4a6a58; --text-label: #608070;
      --border: rgba(120,200,160,0.08); --border-strong: rgba(120,200,160,0.15); --border-input: rgba(120,200,160,0.10);
      --accent: #80c0a0; --accent-bg: rgba(128,192,160,0.12);
      --danger: #c45050; --danger-bg: rgba(196,80,80,0.12); --danger-border: rgba(196,80,80,0.35);
      --success: #50b880; --success-bg: rgba(80,184,128,0.10); --success-border: rgba(80,184,128,0.35);
      --warning: #c4a050;
      --bar-track: rgba(120,200,160,0.06); --bar-fill: rgba(120,200,160,0.25);
      --scrollbar-thumb: rgba(120,200,160,0.10);
      --font-body: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: dark;
    }

    /* ── Theme: HUD — sci-fi heads-up display ── */
    [data-theme="hud"] {
      --bg-primary: #06090c; --bg-secondary: #0c1018; --bg-card: #0e1420;
      --bg-elevated: rgba(14,20,32,0.96); --bg-overlay: rgba(0,0,0,0.7);
      --bg-input: rgba(100,180,200,0.06); --bg-hover: rgba(100,180,200,0.04);
      --text-primary: #b0c8d4; --text-secondary: #607888; --text-tertiary: #405060; --text-label: #506878;
      --border: rgba(100,180,200,0.10); --border-strong: rgba(100,180,200,0.20); --border-input: rgba(100,180,200,0.14);
      --accent: #5a9aaa; --accent-bg: rgba(90,154,170,0.12);
      --danger: #c44040; --danger-bg: rgba(196,64,64,0.12); --danger-border: rgba(196,64,64,0.35);
      --success: #40a070; --success-bg: rgba(64,160,112,0.10); --success-border: rgba(64,160,112,0.35);
      --warning: #b09040;
      --bar-track: rgba(100,180,200,0.06); --bar-fill: rgba(100,180,200,0.25);
      --scrollbar-thumb: rgba(100,180,200,0.12);
      --font-body: 'Menlo', 'SF Mono', system-ui, monospace;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: dark;
    }

    /* Global input/textarea text + placeholder color — ensures visibility in all themes */
    input, textarea { color: var(--text-primary); }
    input::placeholder, textarea::placeholder { color: var(--text-tertiary); opacity: 1; }
    html, body { margin: 0; padding: 0; background: var(--bg-primary); overflow: hidden; height: var(--real-h, 100%); overscroll-behavior: none; }
    [data-theme="glass"] body { background: linear-gradient(145deg, #d5cdc4 0%, #d4d0c8 20%, #e0d8ce 40%, #ccc8c0 60%, #d8d4cb 80%, #c8c4bc 100%); background-size: 300% 300%; animation: liquidShift 20s ease infinite; }
    @keyframes liquidShift { 0% { background-position: 0% 50%; } 33% { background-position: 100% 0%; } 66% { background-position: 50% 100%; } 100% { background-position: 0% 50%; } }
    [data-theme="pixel"] body { background-color: #0a0f0a; background-image: linear-gradient(rgba(0,255,136,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,0.025) 1px, transparent 1px); background-size: 12px 12px; }
    #root { height: var(--real-h, 100%); width: 100%; background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-body); overflow: hidden; overscroll-behavior: none; position: relative; }
    [data-theme="glass"] #root { background: rgba(255,255,255,0.06); backdrop-filter: blur(40px) saturate(2.0) brightness(1.05); -webkit-backdrop-filter: blur(40px) saturate(2.0) brightness(1.05); }
    [data-theme="pixel"] #root { background: transparent; }
    #root::after { content: ''; position: fixed; inset: 0; background-image: var(--sunny-texture); background-repeat: repeat; pointer-events: none; z-index: 0; }
    #root::before { content: ''; position: fixed; inset: 0; background-image: var(--pixel-scanlines); pointer-events: none; z-index: 9997; }
    #root > * { position: relative; z-index: 1; }
    /* Bloomberg: dense monospace, amber grid, sharp but not pixelated */
    [data-theme="bloomberg"] body { background-color: #0c0c0c; background-image: linear-gradient(rgba(255,160,0,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,160,0,0.02) 1px, transparent 1px); background-size: 16px 16px; }
    [data-theme="ink"] body { background-color: #0c0b0a; background-image: radial-gradient(ellipse at 20% 50%, rgba(40,38,34,0.6) 0%, transparent 70%), radial-gradient(ellipse at 80% 30%, rgba(35,33,30,0.4) 0%, transparent 60%), url("data:image/svg+xml,%3Csvg width='500' height='500' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); }
    [data-theme="ink"] div[style*="bg-card"], [data-theme="ink"] div[style*="Card"] { box-shadow: 4px 4px 0 rgba(0,0,0,0.3) !important; border: 1px solid rgba(255,255,255,0.04) !important; }
    [data-theme="aurora"] body { background-color: #080810; background-image: radial-gradient(ellipse at 20% 80%, rgba(60,180,120,0.08) 0%, transparent 50%), radial-gradient(ellipse at 50% 20%, rgba(80,120,200,0.06) 0%, transparent 50%), radial-gradient(ellipse at 80% 60%, rgba(160,80,180,0.05) 0%, transparent 50%); }
    [data-theme="aurora"] #root::after { content: ''; position: fixed; inset: 0; background: linear-gradient(160deg, rgba(60,180,120,0.04) 0%, transparent 30%, rgba(80,120,200,0.03) 50%, transparent 70%, rgba(160,80,180,0.04) 100%); background-size: 400% 400%; animation: auroraShift 25s ease infinite; pointer-events: none; z-index: 0; }
    @keyframes auroraShift { 0% { background-position: 0% 50%; } 25% { background-position: 100% 0%; } 50% { background-position: 50% 100%; } 75% { background-position: 0% 0%; } 100% { background-position: 0% 50%; } }
    [data-theme="aurora"] div[style*="bg-card"], [data-theme="aurora"] div[style*="Card"] { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(120,200,160,0.10) !important; }
    [data-theme="cosmos"] body { background-color: #08080f; background-image: radial-gradient(1px 1px at 10% 20%, rgba(200,190,230,0.4) 0%, transparent 100%), radial-gradient(1px 1px at 30% 65%, rgba(200,190,230,0.3) 0%, transparent 100%), radial-gradient(1px 1px at 55% 15%, rgba(220,210,240,0.35) 0%, transparent 100%), radial-gradient(1px 1px at 70% 80%, rgba(200,190,230,0.25) 0%, transparent 100%), radial-gradient(1px 1px at 85% 40%, rgba(220,210,240,0.3) 0%, transparent 100%), radial-gradient(1px 1px at 20% 90%, rgba(200,190,230,0.2) 0%, transparent 100%), radial-gradient(1px 1px at 45% 50%, rgba(220,210,240,0.3) 0%, transparent 100%), radial-gradient(1px 1px at 95% 10%, rgba(200,190,230,0.25) 0%, transparent 100%); }
    [data-theme="hud"] body { background-color: #06090c; background-image: linear-gradient(rgba(100,180,200,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(100,180,200,0.015) 1px, transparent 1px); background-size: 20px 20px; }
    [data-theme="hud"] * { font-family: 'Menlo', 'SF Mono', system-ui, monospace !important; }
    [data-theme="hud"] button { border: 1px solid rgba(100,180,200,0.15) !important; text-transform: uppercase; letter-spacing: 0.5px; font-size: 12px !important; }
    [data-theme="bloomberg"] * { border-radius: 2px !important; font-family: 'Menlo', 'SF Mono', 'Consolas', monospace !important; }
    [data-theme="bloomberg"] button { border: 1px solid rgba(255,160,0,0.18) !important; text-transform: uppercase; letter-spacing: 0.5px; font-size: 12px !important; font-weight: 600; }
    [data-theme="bloomberg"] input, [data-theme="bloomberg"] textarea { border: 1px solid rgba(255,160,0,0.18) !important; }
    /* Pixel: force sharp corners, pixelated rendering, chunky borders */
    [data-theme="pixel"] * { border-radius: 2px !important; font-family: 'Menlo', 'SF Mono', 'Consolas', monospace !important; }
    [data-theme="pixel"] button { border: 1px solid rgba(0,255,136,0.18) !important; letter-spacing: 0.3px; }
    [data-theme="pixel"] input, [data-theme="pixel"] textarea { border: 1px solid rgba(0,255,136,0.18) !important; }
    /* Liquid Glass: Apple iOS 26 spec — SVG displacement + specular + backdrop blur */
    [data-theme="glass"] div[style*="bg-card"], [data-theme="glass"] div[style*="Card"] {
      backdrop-filter: blur(40px) saturate(2.0) brightness(1.08); -webkit-backdrop-filter: blur(40px) saturate(2.0) brightness(1.08);
      background: linear-gradient(135deg, rgba(255,255,255,0.30) 0%, rgba(255,255,255,0.08) 100%) !important;
      border: 1px solid rgba(255,255,255,0.45) !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), inset 0 -1px 0 rgba(255,255,255,0.15), inset 0 0 30px -5px rgba(255,255,255,0.4), 0 12px 40px rgba(80,70,60,0.10), 0 2px 8px rgba(0,0,0,0.06);
      filter: url(#liquid-glass);
    }

    /* ── Sunny mode: tree shadow video overlay ── */
