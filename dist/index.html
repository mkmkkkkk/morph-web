<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0a" id="meta-theme-color" />
  <title>Morph</title>
  <link rel="icon" href="/favicon-v4.png" type="image/png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon-v4.png" />
  <link rel="manifest" href="/manifest.json" />
  <style>@font-face { font-family: 'CloisterBlack'; src: url('/CloisterBlack.ttf'); }</style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Theme: Dark (default) ── */
    :root, [data-theme="dark"] {
      --bg-primary: #0a0a0a; --bg-secondary: #111; --bg-card: #1c1c1e;
      --bg-elevated: rgba(28,28,30,0.92); --bg-overlay: rgba(0,0,0,0.5);
      --bg-input: rgba(255,255,255,0.08); --bg-hover: rgba(255,255,255,0.06);
      --text-primary: #fff; --text-secondary: #999; --text-tertiary: #666; --text-label: #8e8e93;
      --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.10); --border-input: rgba(255,255,255,0.12);
      --accent: #636AFF; --accent-bg: rgba(99,106,255,0.15);
      --danger: #ff453a; --danger-bg: rgba(255,59,48,0.15); --danger-border: rgba(255,59,48,0.4);
      --success: #30d158; --success-bg: rgba(48,209,88,0.12); --success-border: rgba(48,209,88,0.4);
      --warning: #ff9f0a;
      --bar-track: rgba(255,255,255,0.08); --bar-fill: rgba(255,255,255,0.3);
      --scrollbar-thumb: rgba(255,255,255,0.15);
      --font-body: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: dark;
    }

    /* ── Theme: Light ── */
    [data-theme="light"] {
      --bg-primary: #f5f0eb; --bg-secondary: #eae4dc; --bg-card: #faf7f4;
      --bg-elevated: rgba(255,255,255,0.95); --bg-overlay: rgba(0,0,0,0.3);
      --bg-input: rgba(0,0,0,0.05); --bg-hover: rgba(0,0,0,0.04);
      --text-primary: #2a2420; --text-secondary: #6b5e54; --text-tertiary: #998b80; --text-label: #7a6e64;
      --border: rgba(42,36,32,0.07); --border-strong: rgba(42,36,32,0.11); --border-input: rgba(42,36,32,0.13);
      --accent: #B8907A; --accent-bg: rgba(184,144,122,0.14);
      --danger: #ff3b30; --danger-bg: rgba(255,59,48,0.10); --danger-border: rgba(255,59,48,0.3);
      --success: #34c759; --success-bg: rgba(52,199,89,0.10); --success-border: rgba(52,199,89,0.3);
      --warning: #ff9500;
      --bar-track: rgba(0,0,0,0.06); --bar-fill: rgba(0,0,0,0.2);
      --scrollbar-thumb: rgba(0,0,0,0.15);
      --font-body: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: light;
    }

    /* ── Theme: Sunny ── */
    [data-theme="sunny"] {
      --bg-primary: #f4ede1; --bg-secondary: #eae2d3; --bg-card: #f7f1e7;
      --bg-elevated: rgba(245,240,232,0.95); --bg-overlay: rgba(42,36,32,0.3);
      --bg-input: rgba(42,36,32,0.06); --bg-hover: rgba(42,36,32,0.04);
      --text-primary: #2a2420; --text-secondary: #6b5d4f; --text-tertiary: #998a7a; --text-label: #8a7d6e;
      --border: rgba(42,36,32,0.08); --border-strong: rgba(42,36,32,0.12); --border-input: rgba(42,36,32,0.15);
      --accent: #b87333; --accent-bg: rgba(184,115,51,0.12);
      --danger: #c44230; --danger-bg: rgba(196,66,48,0.10); --danger-border: rgba(196,66,48,0.3);
      --success: #5a8a4a; --success-bg: rgba(90,138,74,0.10); --success-border: rgba(90,138,74,0.3);
      --warning: #d4882a;
      --bar-track: rgba(42,36,32,0.08); --bar-fill: rgba(42,36,32,0.2);
      --scrollbar-thumb: rgba(42,36,32,0.15);
      --font-body: 'Georgia', 'Times New Roman', serif;
      --sunny-texture: url("data:image/svg+xml,%3Csvg width='300' height='300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E"), url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.4' numOctaves='2' seed='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)' opacity='0.04'/%3E%3C/svg%3E");
      --pixel-scanlines: none;
      color-scheme: light;
    }

    /* ── Theme: Brutalist — raw concrete industrial ── */
    [data-theme="brutalist"] {
      --bg-primary: #e8e4e0; --bg-secondary: #d8d4d0; --bg-card: #f0ece8;
      --bg-elevated: rgba(240,236,232,0.98); --bg-overlay: rgba(0,0,0,0.4);
      --bg-input: rgba(0,0,0,0.05); --bg-hover: rgba(0,0,0,0.04);
      --text-primary: #1a1a1a; --text-secondary: #4a4a4a; --text-tertiary: #808080; --text-label: #5a5a5a;
      --border: #1a1a1a; --border-strong: #000; --border-input: #1a1a1a;
      --accent: #1a1a1a; --accent-bg: rgba(0,0,0,0.06);
      --danger: #cc0000; --danger-bg: rgba(204,0,0,0.08); --danger-border: #cc0000;
      --success: #006600; --success-bg: rgba(0,102,0,0.08); --success-border: #006600;
      --warning: #cc6600;
      --bar-track: rgba(0,0,0,0.08); --bar-fill: #1a1a1a;
      --scrollbar-thumb: rgba(0,0,0,0.25);
      --font-body: 'Helvetica Neue', 'Arial', system-ui, sans-serif;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: light;
    }

/* ── Theme: Onyx — dark neumorphic, zero borders, dual shadows ── */
    [data-theme="onyx"] {
      --bg-primary: #28241e; --bg-secondary: #222018; --bg-card: #28241e;
      --bg-elevated: rgba(40,36,30,0.98); --bg-overlay: rgba(0,0,0,0.5);
      --bg-input: #242018; --bg-hover: rgba(255,255,255,0.02);
      --text-primary: #d4ccc0; --text-secondary: #8a847a; --text-tertiary: #5a5650; --text-label: #7a746a;
      --border: transparent; --border-strong: transparent; --border-input: transparent;
      --accent: #a08a70; --accent-bg: rgba(160,138,112,0.10);
      --danger: #b04040; --danger-bg: rgba(176,64,64,0.08); --danger-border: transparent;
      --success: #508050; --success-bg: rgba(80,128,80,0.08); --success-border: transparent;
      --warning: #a08040;
      --bar-track: rgba(255,255,255,0.04); --bar-fill: rgba(255,255,255,0.14);
      --scrollbar-thumb: rgba(255,255,255,0.08);
      --font-body: 'SF Pro Rounded', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: dark;
    }

    /* ── Theme: Clay — neumorphic soft-extruded, zero borders ── */
    [data-theme="clay"] {
      --bg-primary: #d8d0c8; --bg-secondary: #cec6be; --bg-card: #d8d0c8;
      --bg-elevated: rgba(216,208,200,0.98); --bg-overlay: rgba(0,0,0,0.3);
      --bg-input: #d0c8c0; --bg-hover: rgba(0,0,0,0.02);
      --text-primary: #3a3430; --text-secondary: #6a6460; --text-tertiary: #9a9490; --text-label: #7a7470;
      --border: transparent; --border-strong: transparent; --border-input: transparent;
      --accent: #8a7060; --accent-bg: rgba(138,112,96,0.10);
      --danger: #b04040; --danger-bg: rgba(176,64,64,0.08); --danger-border: transparent;
      --success: #508050; --success-bg: rgba(80,128,80,0.08); --success-border: transparent;
      --warning: #a08040;
      --bar-track: rgba(0,0,0,0.06); --bar-fill: rgba(0,0,0,0.18);
      --scrollbar-thumb: rgba(0,0,0,0.12);
      --font-body: 'SF Pro Rounded', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: light;
    }

    /* ── Theme: Terminal — CRT green phosphor ── */
    [data-theme="terminal"] {
      --bg-primary: #000000; --bg-secondary: #050505; --bg-card: #0a0a0a;
      --bg-elevated: rgba(10,10,10,0.98); --bg-overlay: rgba(0,0,0,0.85);
      --bg-input: rgba(0,255,60,0.04); --bg-hover: rgba(0,255,60,0.03);
      --text-primary: #33ff44; --text-secondary: #20aa30; --text-tertiary: #107718; --text-label: #18cc28;
      --border: rgba(0,255,60,0.15); --border-strong: rgba(0,255,60,0.25); --border-input: rgba(0,255,60,0.18);
      --accent: #33ff44; --accent-bg: rgba(0,255,60,0.08);
      --danger: #ff3333; --danger-bg: rgba(255,51,51,0.10); --danger-border: rgba(255,51,51,0.35);
      --success: #33ff44; --success-bg: rgba(0,255,60,0.08); --success-border: rgba(0,255,60,0.30);
      --warning: #ffaa00;
      --bar-track: rgba(0,255,60,0.06); --bar-fill: rgba(0,255,60,0.30);
      --scrollbar-thumb: rgba(0,255,60,0.12);
      --font-body: 'VT323', 'Menlo', 'Courier New', monospace;
      --sunny-texture: none;
      --pixel-scanlines: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      color-scheme: dark;
    }

    /* ── Theme: Noir — cinematic B&W film noir ── */
    [data-theme="noir"] {
      --bg-primary: #0a0a0a; --bg-secondary: #121212; --bg-card: #181818;
      --bg-elevated: rgba(24,24,24,0.97); --bg-overlay: rgba(0,0,0,0.75);
      --bg-input: rgba(255,255,255,0.04); --bg-hover: rgba(255,255,255,0.03);
      --text-primary: #e8e4df; --text-secondary: #8a8680; --text-tertiary: #5a5854; --text-label: #706c68;
      --border: rgba(255,255,255,0.06); --border-strong: rgba(255,255,255,0.10); --border-input: rgba(255,255,255,0.08);
      --accent: #c8c0b4; --accent-bg: rgba(200,192,180,0.08);
      --danger: #b04040; --danger-bg: rgba(176,64,64,0.10); --danger-border: rgba(176,64,64,0.30);
      --success: #608060; --success-bg: rgba(96,128,96,0.08); --success-border: rgba(96,128,96,0.30);
      --warning: #a09060;
      --bar-track: rgba(255,255,255,0.04); --bar-fill: rgba(255,255,255,0.18);
      --scrollbar-thumb: rgba(255,255,255,0.08);
      --font-body: 'Georgia', 'Times New Roman', serif;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: dark;
    }

    /* ── Theme: Stone — carved embossed, ridge borders, inset shadows, small-caps ── */
    [data-theme="stone"] {
      --bg-primary: #c8c0b4; --bg-secondary: #beb6aa; --bg-card: #c8c0b4;
      --bg-elevated: rgba(200,192,180,0.98); --bg-overlay: rgba(0,0,0,0.3);
      --bg-input: #c0b8ac; --bg-hover: rgba(0,0,0,0.03);
      --text-primary: #3a3530; --text-secondary: #60584e; --text-tertiary: #8a8278; --text-label: #706860;
      --border: rgba(60,52,44,0.30); --border-strong: rgba(60,52,44,0.45); --border-input: rgba(60,52,44,0.25);
      --accent: #7a6a58; --accent-bg: rgba(122,106,88,0.12);
      --danger: #a04040; --danger-bg: rgba(160,64,64,0.10); --danger-border: rgba(160,64,64,0.30);
      --success: #508050; --success-bg: rgba(80,128,80,0.10); --success-border: rgba(80,128,80,0.25);
      --warning: #a08040;
      --bar-track: rgba(60,52,44,0.10); --bar-fill: rgba(60,52,44,0.25);
      --scrollbar-thumb: rgba(60,52,44,0.18);
      --font-body: 'Palatino', 'Georgia', 'Times New Roman', serif;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: light;
    }

    /* ── Theme: Rust — industrial warm, tab-header cards ── */
    [data-theme="rust"] {
      --bg-primary: #120e0a; --bg-secondary: #1a1410; --bg-card: #201a14;
      --bg-elevated: rgba(32,26,20,0.97); --bg-overlay: rgba(0,0,0,0.65);
      --bg-input: rgba(200,140,80,0.06); --bg-hover: rgba(200,140,80,0.03);
      --text-primary: #d4c4b0; --text-secondary: #9a8a78; --text-tertiary: #6a5e50; --text-label: #887868;
      --border: rgba(200,140,80,0.12); --border-strong: rgba(200,140,80,0.20); --border-input: rgba(200,140,80,0.14);
      --accent: #c08040; --accent-bg: rgba(192,128,64,0.12);
      --danger: #c04030; --danger-bg: rgba(192,64,48,0.10); --danger-border: rgba(192,64,48,0.30);
      --success: #50904a; --success-bg: rgba(80,144,74,0.08); --success-border: rgba(80,144,74,0.25);
      --warning: #c08040;
      --bar-track: rgba(200,140,80,0.06); --bar-fill: rgba(200,140,80,0.28);
      --scrollbar-thumb: rgba(200,140,80,0.12);
      --font-body: 'Menlo', 'SF Mono', 'Consolas', monospace;
      --sunny-texture: none;
      --pixel-scanlines: none;
      color-scheme: dark;
    }

    /* Global input/textarea text + placeholder color — ensures visibility in all themes */
    input, textarea { color: var(--text-primary); }
    input::placeholder, textarea::placeholder { color: var(--text-tertiary); opacity: 1; }
    html, body { margin: 0; padding: 0; background: var(--bg-primary); overflow: hidden; height: var(--real-h, 100%); overscroll-behavior: none; }
    [data-theme="brutalist"] body { background-color: #e8e4e0; background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E"); }
    #root { height: var(--real-h, 100%); width: 100%; background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-body); overflow: hidden; overscroll-behavior: none; position: relative; }
    [data-theme="brutalist"] #root { background: transparent; }
    #root::after { content: ''; position: fixed; inset: 0; background-image: var(--sunny-texture); background-repeat: repeat; pointer-events: none; z-index: 0; }
    #root::before { content: ''; position: fixed; inset: 0; background-image: var(--pixel-scanlines); pointer-events: none; z-index: 9997; }
    #root > * { position: relative; z-index: 1; }
    /* Onyx: dark neumorphic — no borders, dual shadows, pillow shapes */
    [data-theme="onyx"] body { background-color: #28241e; }
    [data-theme="onyx"] #root { background: transparent; }
    /* Clay: neumorphic — no borders, dual soft shadows, pillow shapes */
    [data-theme="clay"] body { background-color: #d8d0c8; }
    [data-theme="clay"] #root { background: transparent; }
    [data-theme="clay"] * { border-radius: 24px !important; }
    [data-theme="clay"] div[style*="bg-card"], [data-theme="clay"] div[style*="Card"] { border: none !important; background: #d8d0c8 !important; box-shadow: 8px 8px 16px rgba(0,0,0,0.12), -8px -8px 16px rgba(255,255,255,0.6) !important; border-radius: 24px !important; }
    [data-theme="clay"] button { border: none !important; border-radius: 20px !important; background: #d8d0c8 !important; box-shadow: 4px 4px 10px rgba(0,0,0,0.10), -4px -4px 10px rgba(255,255,255,0.5); font-weight: 600; }
    [data-theme="clay"] button:active { box-shadow: inset 3px 3px 8px rgba(0,0,0,0.10), inset -3px -3px 8px rgba(255,255,255,0.5); }
    [data-theme="clay"] input, [data-theme="clay"] textarea { border: none !important; border-radius: 20px !important; background: #d0c8c0 !important; box-shadow: inset 3px 3px 6px rgba(0,0,0,0.08), inset -3px -3px 6px rgba(255,255,255,0.4); }
    /* Noir: film grain, dramatic shadows, italic serif */
    [data-theme="noir"] body { background-color: #0a0a0a; background-image: url("data:image/svg+xml,%3Csvg width='300' height='300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); }
    [data-theme="noir"] * { font-family: 'Georgia', 'Times New Roman', serif !important; }
    [data-theme="noir"] div[style*="bg-card"], [data-theme="noir"] div[style*="Card"] { border: 1px solid rgba(255,255,255,0.05) !important; box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 4px 16px rgba(0,0,0,0.4) !important; border-radius: 4px !important; }
    [data-theme="noir"] button { border: 1px solid rgba(255,255,255,0.08) !important; border-radius: 4px !important; font-style: italic; letter-spacing: 0.3px; }
    [data-theme="noir"] input, [data-theme="noir"] textarea { border: 1px solid rgba(255,255,255,0.06) !important; border-radius: 4px !important; font-style: italic; }
    /* Terminal: CRT scanlines, green glow, zero radius */
    [data-theme="terminal"] body { background-color: #000; }
    [data-theme="terminal"] * { border-radius: 0px !important; font-family: 'VT323', 'Menlo', 'Courier New', monospace !important; font-size: inherit; }
    [data-theme="terminal"] div[style*="bg-card"], [data-theme="terminal"] div[style*="Card"] { border: 1px solid rgba(0,255,60,0.20) !important; box-shadow: 0 0 8px rgba(0,255,60,0.06), inset 0 0 20px rgba(0,255,60,0.02) !important; }
    [data-theme="terminal"] button { border: 1px solid rgba(0,255,60,0.25) !important; text-transform: uppercase; letter-spacing: 1px; font-weight: 400; text-shadow: 0 0 6px rgba(0,255,60,0.4); }
    [data-theme="terminal"] button:hover { box-shadow: 0 0 12px rgba(0,255,60,0.15); }
    [data-theme="terminal"] input, [data-theme="terminal"] textarea { border: 1px solid rgba(0,255,60,0.20) !important; text-shadow: 0 0 4px rgba(0,255,60,0.3); }
    [data-theme="terminal"] #root::before { content: ''; position: fixed; inset: 0; background-image: var(--pixel-scanlines); pointer-events: none; z-index: 9997; }
    /* Stone: carved embossed, everything sunken into surface */
    [data-theme="stone"] body { background-color: #c8c0b4; }
    [data-theme="stone"] #root { background: transparent; }
    [data-theme="stone"] * { border-radius: 8px !important; font-family: 'Palatino', 'Georgia', 'Times New Roman', serif !important; font-variant: small-caps; }
    [data-theme="stone"] div[style*="bg-card"], [data-theme="stone"] div[style*="Card"] { border: 3px ridge rgba(60,52,44,0.35) !important; background: #c8c0b4 !important; box-shadow: inset 4px 4px 10px rgba(0,0,0,0.12), inset -2px -2px 6px rgba(255,255,255,0.30) !important; border-radius: 8px !important; }
    [data-theme="stone"] button { border: 2px ridge rgba(60,52,44,0.30) !important; border-radius: 8px !important; font-variant: small-caps; letter-spacing: 1px; font-weight: 600; }
    [data-theme="stone"] button:active { box-shadow: inset 2px 2px 6px rgba(0,0,0,0.15); }
    [data-theme="stone"] input, [data-theme="stone"] textarea { border: 2px ridge rgba(60,52,44,0.25) !important; border-radius: 8px !important; box-shadow: inset 2px 2px 4px rgba(0,0,0,0.08), inset -1px -1px 3px rgba(255,255,255,0.20); }
    [data-theme="onyx"] * { border-radius: 24px !important; }
    [data-theme="onyx"] div[style*="bg-card"], [data-theme="onyx"] div[style*="Card"] { border: none !important; background: #28241e !important; box-shadow: 8px 8px 16px rgba(0,0,0,0.35), -8px -8px 16px rgba(255,255,255,0.04) !important; border-radius: 24px !important; }
    [data-theme="onyx"] button { border: none !important; border-radius: 20px !important; background: #28241e !important; box-shadow: 4px 4px 10px rgba(0,0,0,0.30), -4px -4px 10px rgba(255,255,255,0.03); font-weight: 600; }
    [data-theme="onyx"] button:active { box-shadow: inset 3px 3px 8px rgba(0,0,0,0.25), inset -3px -3px 8px rgba(255,255,255,0.02); }
    [data-theme="onyx"] input, [data-theme="onyx"] textarea { border: none !important; border-radius: 20px !important; background: #242018 !important; box-shadow: inset 3px 3px 6px rgba(0,0,0,0.20), inset -3px -3px 6px rgba(255,255,255,0.02); }
